<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event</title>

    <link rel="stylesheet" href="aula.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<form id="eventForm">
    <label>Event Name</label><br>
    <input type="text" id="eventName"><br>
    <label>Event Type</label><br>
    <input type="text" id="eventType"><br>
    <label>When</label><br>
    <input type="text" id="eventWhen"><br>
    <label>Date</label><br>
    <input type="date" id="eventDate"><br>
    <label>Time</label><br>
    <input type="time" id="eventTime"><br>
    <label>Guest</label><br>
    <input type="text" id="eventGuest"><br><br>
    <button type="button" id="addEventBtn">Add Event</button>
</form>

<script src="aula.js"></script>
</body>
</html>
